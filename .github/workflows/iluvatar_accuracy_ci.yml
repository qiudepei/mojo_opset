name: Run test case on ilu
on:
  pull_request:
    branches:
    - master
    types: [ opened, synchronize, reopened ]
    paths-ignore:
    - 'CHANGELOG.md'
    - 'README.md'
    - 'mojo_opset/backends/ttx/kernels/npu/**'
    - 'mojo_opset/backends/torch_npu/**'
    - '.github/workflows/ascend_accuracy_ci.yml'
  push:
    branches:
    - master
    paths-ignore:
    - 'CHANGELOG.md'
    - 'README.md'
    - 'mojo_opset/backends/ttx/kernels/npu/**'
    - 'mojo_opset/backends/torch_npu/**'
    - '.github/workflows/ascend_accuracy_ci.yml'
  workflow_dispatch:
env:
  MOJO_OPSET_PROXY: ${{ secrets.MOJO_OPSET_PROXY }}
  CONTAINER_NAME: ci-ilu-${{ github.run_id }}
defaults:
  run:
    shell: bash
jobs:
  run-tests:
    name: Run ilu tests
    runs-on: ILU
    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker run -d --rm \
            --name ${{ env.CONTAINER_NAME }} \
            --privileged --cap-add=ALL --pid=host --ipc=host --network=host \
            -v ${{ github.workspace }}:/workspace \
            -v /data:/data \
            -v /data1:/data1 \
            -v /lib/modules:/lib/modules \
            -v /usr/src:/usr/src \
            -v /dev:/dev \
            corex:4.4.0 \
            tail -f /dev/null

      - name: Build And Install Wheel Artifact
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c "
            cd /workspace
            git config --global --add safe.directory /workspace
            export HTTP_PROXY=${MOJO_OPSET_PROXY} HTTPS_PROXY=${MOJO_OPSET_PROXY}
            pip install -U pip setuptools wheel build pytest-xdist
            pip install -e .[ilu] --index-url https://bytedpypi.byted.org/simple
            python3 -m build .
            pip install dist/*.whl --force-reinstall --no-deps
          "

      - name: test-TTX
        run: |
          docker exec ${{ env.CONTAINER_NAME }} bash -c "
            cd /workspace
            echo 'Running ttx kernels tests on Iluvatar GPU...'
            MOJO_BACKEND=ttx python3 -m pytest tests/accuracy/operators/ \
              --ignore=tests/accuracy/operators/test_compute_with_comm.py
          "

      - name: Cleanup
        if: always()
        run: docker rm -f ${{ env.CONTAINER_NAME }} || true
